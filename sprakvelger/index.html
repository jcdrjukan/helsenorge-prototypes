<style>

/* ── Page layout ─────────────────────────────────────────────── */
.page { padding: var(--space-m) var(--space-s); width: 100%; }

/* ── Selector label ──────────────────────────────────────────── */
.selector-label {
  font: var(--mobile-body-strong);
  color: var(--color-base-text-onlight);
  margin-bottom: 6px;
  display: block;
}

/* ── Field (chips + search input) ────────────────────────────── */
.selector-field {
  border: 1px solid var(--neutral-300);
  border-radius: 0;
  background: #fff;
  padding: 8px;
  cursor: text;
  transition: border-color 0.15s, box-shadow 0.15s;
}

/* ── Chips ───────────────────────────────────────────────────── */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px;
  background: var(--blueberry-50);
  padding: 0 4px 0 12px;
  border-radius: var(--radius-full);
  border: 1px solid var(--blueberry-500);
  user-select: none;
}
.chip-text {
  font: 600 16px/20px 'Source Sans Pro', sans-serif;
  letter-spacing: 0.48px;
  text-transform: uppercase;
  color: var(--blueberry-800);
  white-space: nowrap;
}
.chip-remove {
  display: flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
  border: none; background: none;
  cursor: pointer; color: var(--blueberry-800);
  padding: 0; flex-shrink: 0;
}
.chip-remove:hover { opacity: 0.7; }

/* ── Search row ──────────────────────────────────────────────── */
.search-row { display: flex; align-items: center; gap: 8px; }
.search-icon { color: var(--neutral-500); flex-shrink: 0; display: flex; }
#search {
  border: none; outline: none; background: transparent;
  font: 400 16px/1.5 'Source Sans Pro', sans-serif;
  color: var(--neutral-900);
  flex: 1; min-width: 100px; padding: 2px 0;
}
#search:focus-visible { outline: none; }
#search::placeholder { color: var(--neutral-500); }

/* ── Dropdown ────────────────────────────────────────────────── */
.dropdown {
  border: 2px solid var(--blueberry-500);
  border-radius: 0;
  background: #fff;
  margin-top: 4px;
  overflow: hidden;
  display: none;
}
.dropdown.open { display: block; }
.dropdown-inner { max-height: 264px; overflow-y: auto; scrollbar-width: none; }
.dropdown-inner::-webkit-scrollbar { display: none; }

/* ── Options ─────────────────────────────────────────────────── */
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  min-height: 44px;
  font: 400 18px/1.2 'Source Sans Pro', sans-serif;
  color: #000;
  cursor: pointer;
  border-top: 1px solid var(--neutral-200);
}
.opt:first-child { border-top: none; }
.opt:hover { background: var(--neutral-50); }
.opt.selected { background: var(--blueberry-50); }
.opt.selected:hover { background: var(--blueberry-100); }

.opt-check {
  width: 26px; height: 26px;
  border: 1px solid var(--neutral-300);
  border-radius: 3px; background: #fff;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.opt.selected .opt-check {
  background: var(--blueberry-500);
  border-color: var(--blueberry-500);
  color: #fff;
}
.opt-check-svg { display: none; }
.opt.selected .opt-check-svg { display: block; }

.opt-name { flex: 1; }
.opt-code {
  font: 400 14px/1 'Source Sans Pro', sans-serif;
  color: var(--neutral-500);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}

.no-results {
  padding: 16px;
  font: 400 18px/1.5 'Source Sans Pro', sans-serif;
  color: var(--neutral-600); text-align: center;
}



</style>

LANGUAGES.sort((a, b) => a.name.localeCompare(b.name, 'no'));

let selected = new Set();
let query = '';

const searchEl  = document.getElementById('search');
const dropdown  = document.getElementById('dropdown');
const listEl    = document.getElementById('list');
const chipsEl   = document.getElementById('chips');
const fieldEl   = document.getElementById('field');

const CHECK_SVG = `<svg class="opt-check-svg" width="14" height="11" viewBox="0 0 14 11" fill="none"><polyline points="1,5.5 5,9.5 13,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function getFiltered() {
  const q = query.toLowerCase();
  return LANGUAGES.filter(l =>
    l.name.toLowerCase().includes(q) || l.code.toLowerCase().includes(q)
  );
}

function renderChips() {
  chipsEl.innerHTML = '';
  selected.forEach(code => {
    const lang = LANGUAGES.find(l => l.code === code);
    if (!lang) return;
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.innerHTML = `<span class="chip-text">${lang.name}</span><button class="chip-remove" data-code="${code}" title="Fjern" aria-label="Fjern ${lang.name}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    chipsEl.appendChild(chip);
  });
  chipsEl.querySelectorAll('.chip-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      selected.delete(btn.dataset.code);
      renderChips();
      renderList();
      renderSummary();
    });
  });
  chipsEl.style.display = selected.size ? 'flex' : 'none';
}

function renderList() {
  const filtered = getFiltered();
  listEl.innerHTML = '';
  if (!filtered.length) {
    listEl.innerHTML = '<div class="no-results">Ingen språk funnet</div>';
    return;
  }
  filtered.forEach(lang => {
    const div = document.createElement('div');
    div.className = 'opt' + (selected.has(lang.code) ? ' selected' : '');
    div.innerHTML = `<span class="opt-check">${CHECK_SVG}</span><span class="opt-name">${lang.name}</span><span class="opt-code">${lang.code.toUpperCase()}</span>`;
    div.addEventListener('mousedown', e => {
      e.preventDefault();
      if (selected.has(lang.code)) selected.delete(lang.code);
      else selected.add(lang.code);
      renderChips();
      renderList();
    });
    listEl.appendChild(div);
  });
}

function openDropdown() {
  dropdown.classList.add('open');
  renderList();
}

function closeDropdown() {
  dropdown.classList.remove('open');
}

searchEl.addEventListener('focus', openDropdown);
searchEl.addEventListener('blur', () => setTimeout(closeDropdown, 150));
searchEl.addEventListener('input', () => { query = searchEl.value; renderList(); });
searchEl.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDropdown(); searchEl.blur(); }
});
fieldEl.addEventListener('click', () => searchEl.focus());

renderChips();
